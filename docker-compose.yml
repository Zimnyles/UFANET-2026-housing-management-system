services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hms-net

  postgres-init:
    image: postgres:16-alpine
    restart: "no"
    environment:
      PGPASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - sh
      - -ec
      - |
        for db in auth profile requests notifications news; do
          if [ "$$(psql -h postgres -U postgres -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname = '$$db'")" != "1" ]; then
            createdb -h postgres -U postgres "$$db"
          fi
        done
    networks:
      - hms-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - hms-net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hms-net

  auth-service:
    build:
      context: .
      dockerfile: auth-microservice/Dockerfile
    restart: unless-stopped
    environment:
      APP_NAME: auth-service
      APP_HOST: 0.0.0.0
      APP_PORT: 50051
      LOG_LEVEL: info

      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 168h

      REQUEST_TIMEOUT: 5s

      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth
      POSTGRES_SSLMODE: disable
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    networks:
      - hms-net

  profile-service:
    build:
      context: .                          
      dockerfile: profile-microservice/Dockerfile
    restart: unless-stopped
    environment:
      APP_NAME: profile-service
      APP_HOST: 0.0.0.0
      APP_PORT: 50052
      LOG_LEVEL: info

      REQUEST_TIMEOUT: 5s

      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: profile
      POSTGRES_SSLMODE: disable
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    networks:
      - hms-net

  news-service:
    build:
      context: .
      dockerfile: news-microservice/Dockerfile
    restart: unless-stopped
    environment:
      APP_NAME: news-service
      APP_HOST: 0.0.0.0
      APP_PORT: 50053
      LOG_LEVEL: info

      REQUEST_TIMEOUT: 5s

      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: news
      POSTGRES_SSLMODE: disable

      RABBIT_HOST: rabbitmq
      RABBIT_PORT: 5672
      RABBIT_USER: guest
      RABBIT_PASSWORD: guest
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    networks:
      - hms-net

  requests-service:
    build:
      context: .
      dockerfile: requests-microservice/Dockerfile
    restart: unless-stopped
    environment:
      APP_NAME: requests-service
      APP_HOST: 0.0.0.0
      APP_PORT: 50054
      LOG_LEVEL: info

      REQUEST_TIMEOUT: 5s

      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: requests
      POSTGRES_SSLMODE: disable

      RABBIT_HOST: rabbitmq
      RABBIT_PORT: 5672
      RABBIT_USER: guest
      RABBIT_PASSWORD: guest
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    networks:
      - hms-net

  notification-service:
    build:
      context: .
      dockerfile: notification-microservice/Dockerfile
    restart: unless-stopped
    environment:
      APP_NAME: notification-service
      APP_HOST: 0.0.0.0
      APP_PORT: 50055
      LOG_LEVEL: info
      REQUEST_TIMEOUT: 5s
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notifications
      POSTGRES_SSLMODE: disable
      RABBIT_HOST: rabbitmq
      RABBIT_PORT: 5672
      RABBIT_USER: guest
      RABBIT_PASSWORD: guest
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    networks:
      - hms-net

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APP_NAME: api-gateway
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      APP_PREFORK: "false"
      LOG_LEVEL: info

      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}

      RATE_LIMIT_MAX: 100
      RATE_LIMIT_EXPIRATION: 1m

      REQUEST_TIMEOUT: 5s

      AUTH_ADDR: auth-service:50051
      PROFILE_ADDR: profile-service:50052
      REQUESTS_ADDR: requests-service:50054
      NEWS_ADDR: news-service:50053
      NOTIFICATIONS_ADDR: notification-service:50055

      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
    depends_on:
      auth-service:
        condition: service_started
      profile-service:
        condition: service_started
      news-service:
        condition: service_started
      requests-service:
        condition: service_started
      notification-service:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - hms-net

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - hms-net

volumes:
  postgres_data:

networks:
  hms-net:
    driver: bridge
