<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#003399">
  <title>ЖЭУ Онлайн — личный кабинет</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="toast" class="toast" aria-live="polite"></div>

  <section id="authView" class="auth-shell">
    <main class="auth-panel">
      <form id="authForm" class="auth-card">
        <a class="brand auth-logo" href="/login">ЖЭУ Онлайн</a>
        <h2 id="authTitle">Вход</h2>
        <label>E-mail<input id="email" type="email" autocomplete="email" required placeholder="name@example.ru"></label>
        <label>Пароль<input id="password" type="password" autocomplete="current-password" minlength="8" required placeholder="Не менее 8 символов"></label>
        <label id="adminCodeField" class="hidden">Код сотрудника УК<input id="adminCode" autocomplete="off" placeholder="Только для сотрудников"></label>
        <button id="authSubmit" class="button primary" type="submit">Войти</button>
        <button id="authToggle" class="text-button" type="button">Нет аккаунта? Зарегистрироваться</button>
      </form>
    </main>
  </section>

  <div id="appView" class="app-shell hidden">
    <aside class="sidebar">
      <a class="brand" href="/profile" data-route>ЖЭУ Онлайн</a>
      <nav>
        <a href="/profile" data-route><span>⌂</span> Мой дом</a>
        <a href="/news" data-route><span>◫</span> Новости</a>
        <a href="/requests" data-route><span>✓</span> Заявки</a>
        <a href="/management" data-route data-admin class="hidden"><span>⚙</span> Управление</a>
        <a href="/settings" data-route><span>⚙</span> Настройки</a>
      </nav>
      <div class="sidebar-foot">
        <button id="logoutButton" class="text-button light">Выйти из аккаунта</button>
      </div>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div><p class="eyebrow" id="pageEyebrow">Личный кабинет</p><h1 id="pageTitle">Мой дом</h1></div>
        <div class="user-chip"><span id="userInitial">Д</span><div><b id="userName">Житель</b><small id="userRole">Пользователь</small></div></div>
      </header>
      <div id="page" class="page"></div>
    </main>
  </div>

  <script src="/app.js" defer></script>
</body>
</html>
